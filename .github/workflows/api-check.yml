name: API Check
on:
  workflow_dispatch: 

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run API check action
        id: api-check
        uses: ./.github./actions/api-check

      - name: Print result
        run: echo "API returned ${{ steps.api-check.outputs.result }}"
